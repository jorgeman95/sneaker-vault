<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Sneaker Vault"/>
  <meta name="theme-color" content="#080810"/>
  <title>Sneaker Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; }
    body { background: #080810; color: #f0ede8; font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; width: 100%; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 2px; }
    button { font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; }

    @keyframes fuup { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fall  { from{transform:translateY(-20px) rotate(0deg);opacity:1} to{transform:translateY(110vh) rotate(720deg);opacity:0} }
    @keyframes pop   { 0%{transform:translate(-50%,-50%) scale(0.3);opacity:0} 60%{transform:translate(-50%,-50%) scale(1.1)} 100%{transform:translate(-50%,-50%) scale(1);opacity:1} }
    @keyframes spin  { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    .sv-card { animation: fuup 0.3s ease; transition: transform 0.2s, box-shadow 0.2s; }
    .sv-card:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,0,0,0.5); }

    #header { position: sticky; top: 0; z-index: 100; background: rgba(8,8,16,0.97); backdrop-filter: blur(20px); border-bottom: 1px solid #16161f; padding: calc(env(safe-area-inset-top) + 14px) 18px 0; width: 100%; overflow: hidden; }
    .header-inner { max-width: 1100px; margin: 0 auto; width: 100%; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; width: 100%; }
    .vault-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(28px,6vw,48px); letter-spacing: 4px; line-height: 1; background: linear-gradient(135deg,#FFD700 0%,#FF6B35 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .vault-sub { color: #444; font-size: 11px; letter-spacing: 2px; margin-top: 3px; }
    .header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .view-toggle { display: flex; background: #13131a; border-radius: 8px; padding: 3px; border: 1px solid #1e1e2a; }
    .view-btn { padding: 6px 11px; background: transparent; color: #444; border-radius: 6px; font-size: 15px; transition: all 0.15s; }
    .view-btn.active { background: #2a2a3a; color: #f0ede8; }
    .add-btn { padding: 9px 18px; background: linear-gradient(135deg,#FFD700,#FF8C00); color: #080810; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; box-shadow: 0 4px 16px rgba(255,180,0,0.25); white-space: nowrap; }

    .controls-bar { display: flex; gap: 8px; margin-bottom: 12px; width: 100%; overflow: hidden; }
    .search-wrap { position: relative; flex: 1; min-width: 0; }
    .search-wrap input { width: 100%; padding: 8px 12px 8px 32px; background: #0d0d18; border: 1px solid #1e1e2a; border-radius: 8px; color: #f0ede8; font-size: 13px; outline: none; font-family: 'DM Sans', sans-serif; }
    .search-wrap input::placeholder { color: #444; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: #444; pointer-events: none; }
    .sort-select { padding: 8px 8px; background: #0d0d18; border: 1px solid #1e1e2a; border-radius: 8px; color: #888; font-size: 12px; font-family: 'DM Sans', sans-serif; outline: none; cursor: pointer; flex-shrink: 0; max-width: 100px; }
    .color-filter-btn { padding: 8px 10px; background: #0d0d18; border: 1px solid #1e1e2a; border-radius: 8px; color: #888; font-size: 12px; display: flex; align-items: center; gap: 5px; transition: border-color 0.15s; flex-shrink: 0; white-space: nowrap; }
    .color-filter-btn.active { border-color: #FFD700; color: #FFD700; }

    #color-filter-panel { background: #13131a; border: 1px solid #2a2a3a; border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; display: none; flex-wrap: wrap; gap: 10px; align-items: center; }
    .cf-swatch { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s; flex-shrink: 0; }
    .cf-swatch:hover { transform: scale(1.15); }
    .cf-swatch.selected { border-color: #fff; transform: scale(1.15); }
    .cf-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
    .cf-label { font-size: 10px; color: #666; }
    .cf-clear { padding: 5px 12px; background: transparent; border: 1px solid #2a2a3a; border-radius: 20px; color: #666; font-size: 12px; }

    #progress-bar { height: 3px; background: #16161f; border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
    #progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
    #tabs { display: flex; }
    .tab-btn { padding: 7px 16px; background: none; border: none; border-bottom: 2px solid transparent; color: #444; font-weight: 500; font-size: 12px; margin-bottom: -1px; transition: all 0.15s; }
    .tab-btn.active { border-bottom-color: #FFD700; color: #FFD700; }

    #collection { max-width: 1100px; margin: 0 auto; padding: 16px 12px; width: 100%; overflow-x: hidden; }
    #empty-state { text-align: center; padding: 40px 20px; }
    #empty-state .big-shoe { font-size: 70px; margin-bottom: 16px; }
    #empty-state h2 { font-family: 'Bebas Neue', sans-serif; font-size: 34px; letter-spacing: 5px; color: #2a2a3a; margin-bottom: 10px; }
    #empty-state p { color: #3a3a4a; font-size: 14px; margin-bottom: 24px; }
    #empty-state .start-btn { padding: 13px 32px; background: linear-gradient(135deg,#FFD700,#FF8C00); color: #080810; border-radius: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; box-shadow: 0 8px 24px rgba(255,180,0,0.2); }

    #grid-view { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; width: 100%; min-width: 0; }
    @media (min-width: 700px) { #grid-view { grid-template-columns: repeat(4,1fr); } }
    #grid-view > * { min-width: 0; overflow: hidden; }

    .grid-card { background: #13131a; border-radius: 14px; padding: 10px; position: relative; width: 100%; min-width: 0; overflow: hidden; }
    .worn-badge-abs { position: absolute; top: 8px; right: 8px; background: rgba(0,200,100,0.12); border: 1px solid rgba(0,200,100,0.25); border-radius: 20px; padding: 2px 6px; font-size: 8px; color: #00C864; font-weight: 700; letter-spacing: 1px; }
    .img-box { display: flex; justify-content: center; align-items: center; height: 90px; margin-bottom: 8px; background: #0a0a12; border-radius: 10px; overflow: hidden; width: 100%; }
    .img-box img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .card-name-txt { font-weight: 600; font-size: 11px; line-height: 1.3; margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; display: block; }
    .color-dots { display: flex; gap: 4px; margin-bottom: 7px; align-items: center; overflow: hidden; width: 100%; }
    .color-dot { width: 11px; height: 11px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); flex-shrink: 0; }
    .color-dot-label { font-size: 9px; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 50px; }
    .card-actions { display: flex; gap: 4px; width: 100%; min-width: 0; }
    .worn-btn-grid { flex: 1; min-width: 0; padding: 6px 0; border-radius: 7px; font-size: 9px; font-weight: 700; letter-spacing: 0.5px; transition: filter 0.15s; overflow: hidden; }
    .worn-btn-grid:hover { filter: brightness(1.3); }
    .edit-btn-grid { padding: 6px 7px; background: rgba(255,255,255,0.04); border: 1px solid #1e1e2a; border-radius: 7px; color: #555; font-size: 11px; flex-shrink: 0; }
    .del-btn-grid  { padding: 6px 7px; background: rgba(255,40,40,0.05); border: 1px solid rgba(255,40,40,0.1); border-radius: 7px; color: #553333; font-size: 11px; flex-shrink: 0; }

    #list-view { display: flex; flex-direction: column; gap: 8px; width: 100%; }
    .list-card { background: #13131a; border-radius: 12px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; width: 100%; min-width: 0; overflow: hidden; }
    .thumb { width: 52px; height: 52px; background: #0a0a12; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .thumb img { width: 100%; height: 100%; object-fit: contain; }
    .list-info { flex: 1; min-width: 0; overflow: hidden; }
    .list-name { font-weight: 600; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 4px; width: 100%; display: block; }
    .list-colors { display: flex; gap: 4px; align-items: center; overflow: hidden; }
    .worn-badge-list { background: rgba(0,200,100,0.1); border: 1px solid rgba(0,200,100,0.2); border-radius: 20px; padding: 3px 8px; font-size: 9px; color: #00C864; font-weight: 700; letter-spacing: 1px; white-space: nowrap; flex-shrink: 0; }
    .worn-btn-list { padding: 7px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; white-space: nowrap; transition: filter 0.15s; flex-shrink: 0; }
    .worn-btn-list:hover { filter: brightness(1.3); }
    .edit-btn-list { padding: 7px 8px; background: rgba(255,255,255,0.04); border: 1px solid #1e1e2a; border-radius: 8px; color: #555; font-size: 12px; flex-shrink: 0; }
    .del-btn-list  { padding: 7px 8px; background: none; border: 1px solid #1e1e2a; border-radius: 8px; color: #443333; font-size: 12px; flex-shrink: 0; }

    .overlay { position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; padding: 16px; overflow-y: auto; }
    .modal { background: #13131a; border: 1px solid #2a2a3a; border-radius: 20px; padding: 28px; max-width: 440px; width: 100%; animation: fuup 0.2s ease; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 3px; background: linear-gradient(135deg,#FFD700,#FF8C00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .close-btn { background: none; color: #555; font-size: 22px; }
    .field-label { font-size: 11px; color: #555; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; display: block; }
    .text-inp { background: #0a0a12; border: 1px solid #2a2a3a; border-radius: 10px; color: #f0ede8; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; padding: 11px 14px; width: 100%; margin-bottom: 14px; }
    .upload-zone { border: 2px dashed #2a2a3a; border-radius: 12px; padding: 24px 16px; text-align: center; cursor: pointer; margin-bottom: 8px; transition: border-color 0.2s; }
    .upload-zone:hover { border-color: #444; }
    .upload-zone img { max-height: 120px; object-fit: contain; }
    .upload-icon { font-size: 30px; margin-bottom: 6px; }
    .upload-label { color: #555; font-size: 13px; }
    .upload-hint  { color: #333; font-size: 11px; margin-top: 3px; }
    .remove-img { background: none; color: #555; font-size: 11px; margin-bottom: 16px; padding: 0; display: block; }

    .color-section { margin-bottom: 18px; }
    .color-extract-status { font-size: 11px; height: 16px; margin-bottom: 10px; }
    .color-pickers { display: flex; gap: 20px; }
    .color-picker-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .color-picker-wrap { position: relative; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; flex-shrink: 0; }
    .color-preview { width: 44px; height: 44px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); }
    .color-inp-hidden { position: absolute; opacity: 0; width: 44px; height: 44px; top: 0; left: 0; cursor: pointer; border-radius: 50%; }
    .color-picker-name { font-size: 10px; color: #FFD700; font-weight: 600; text-align: center; min-height: 14px; }
    .color-picker-sublabel { font-size: 10px; color: #444; text-align: center; }
    .add-to-vault { width: 100%; padding: 13px 0; color: #080810; border-radius: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 21px; letter-spacing: 3px; transition: all 0.2s; margin-top: 4px; }

    .confirm-modal { max-width: 340px; text-align: center; }
    .confirm-icon  { font-size: 48px; margin-bottom: 10px; }
    .confirm-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; margin-bottom: 8px; }
    .confirm-body  { color: #888; font-size: 13px; margin-bottom: 24px; line-height: 1.6; }
    .confirm-name  { color: #f0ede8; font-weight: 600; }
    .confirm-actions { display: flex; gap: 10px; }
    .cancel-btn { flex: 1; padding: 11px 0; background: transparent; border: 1px solid #2a2a3a; border-radius: 10px; color: #666; font-size: 13px; }
    .go-btn     { flex: 1; padding: 11px 0; border-radius: 10px; font-weight: 700; font-size: 13px; }

    #confetti-layer { position: fixed; inset: 0; pointer-events: none; z-index: 9999; overflow: hidden; display: none; }
    .cf-piece { position: absolute; top: -20px; border-radius: 50%; }
    #confetti-msg { position: absolute; top: 40%; left: 50%; animation: pop 0.5s ease forwards; text-align: center; white-space: nowrap; }
    #confetti-msg .trophy { font-size: 56px; }
    #confetti-msg .big-text { font-family: 'Bebas Neue', sans-serif; font-size: clamp(26px,5vw,42px); color: #FFD700; letter-spacing: 4px; text-shadow: 0 0 40px rgba(255,215,0,0.9); }
    #confetti-msg .small-text { font-family: 'DM Sans', sans-serif; color: #fff; font-size: 15px; margin-top: 6px; opacity: 0.8; }
  </style>
</head>
<body>

<div id="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="vault-title">SNEAKER VAULT</div>
        <div class="vault-sub" id="cycle-text">YOUR COLLECTION AWAITS</div>
      </div>
      <div class="header-actions">
        <div class="view-toggle">
          <button class="view-btn active" id="btn-grid" onclick="setView('grid')">⊞</button>
          <button class="view-btn" id="btn-list" onclick="setView('list')">☰</button>
        </div>
        <button class="add-btn" onclick="openAddModal()">+ ADD</button>
      </div>
    </div>
    <div class="controls-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-inp" placeholder="Search sneakers..." oninput="render()"/>
      </div>
      <select class="sort-select" id="sort-select" onchange="render()">
        <option value="added">Added ↓</option>
        <option value="name" selected>Name A–Z</option>
        <option value="name-desc">Name Z–A</option>
      </select>
      <button class="color-filter-btn" id="color-filter-btn" onclick="toggleColorPanel()">
        🎨 <span id="color-filter-label">Color</span>
      </button>
    </div>
    <div id="color-filter-panel"></div>
    <div id="progress-bar" style="display:none"><div id="progress-fill"></div></div>
    <div id="tabs" style="display:none">
      <button class="tab-btn"        onclick="setTab('all')"    id="tab-all">All</button>
      <button class="tab-btn active" onclick="setTab('unworn')" id="tab-unworn">Unworn</button>
      <button class="tab-btn"        onclick="setTab('worn')"   id="tab-worn">Worn</button>
    </div>
  </div>
</div>

<div id="collection">
  <div id="empty-state">
    <div class="big-shoe">👟</div>
    <h2>VAULT IS EMPTY</h2>
    <p>Start adding your kicks to track your rotation</p>
    <button class="start-btn" onclick="openAddModal()">ADD YOUR FIRST PAIR</button>
  </div>
  <div id="grid-view" style="display:none"></div>
  <div id="list-view" style="display:none"></div>
  <div id="bottom-add" style="display:none; text-align:center; padding:24px 0 32px;">
    <button onclick="openAddModal()" style="padding:12px 32px;background:linear-gradient(135deg,#FFD700,#FF8C00);color:#080810;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;box-shadow:0 4px 20px rgba(255,180,0,0.2);">+ ADD SNEAKER</button>
  </div>
</div>

<div class="overlay" id="add-overlay" style="display:none" onclick="if(event.target===this)closeAddModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title-text">ADD SNEAKER</div>
      <button class="close-btn" onclick="closeAddModal()">✕</button>
    </div>
    <label class="field-label">Name / Colorway</label>
    <input class="text-inp" id="sneaker-name-inp" type="text" placeholder="e.g. Jordan 1 Chicago" onkeydown="if(event.key==='Enter')doAdd()"/>
    <label class="field-label">Photo</label>
    <div class="upload-zone" onclick="document.getElementById('file-inp').click()">
      <div id="upload-placeholder">
        <div class="upload-icon">📸</div>
        <div class="upload-label">Tap to upload sneaker photo</div>
        <div class="upload-hint">PNG with transparent background looks best</div>
      </div>
      <img id="img-preview" style="display:none" alt="preview"/>
    </div>
    <input type="file" id="file-inp" accept="image/*" style="display:none" onchange="handleFile(this)"/>
    <button class="remove-img" id="remove-img-btn" style="display:none" onclick="removeImg()">✕ Remove image</button>
    <div class="color-section">
      <label class="field-label">Colors <span style="color:#333;font-size:10px;text-transform:none;letter-spacing:0">(auto-detected · tap circle to change)</span></label>
      <div class="color-extract-status" id="extract-status"></div>
      <div class="color-pickers">
        <div class="color-picker-item">
          <div class="color-picker-wrap">
            <div class="color-preview" id="primary-preview" style="background:#cccccc"></div>
            <input type="color" class="color-inp-hidden" id="primary-color-inp" value="#cccccc" oninput="onColorChange('primary')"/>
          </div>
          <div class="color-picker-name" id="primary-name">—</div>
          <div class="color-picker-sublabel">Primary</div>
        </div>
        <div class="color-picker-item">
          <div class="color-picker-wrap">
            <div class="color-preview" id="secondary-preview" style="background:#cccccc"></div>
            <input type="color" class="color-inp-hidden" id="secondary-color-inp" value="#cccccc" oninput="onColorChange('secondary')"/>
          </div>
          <div class="color-picker-name" id="secondary-name">—</div>
          <div class="color-picker-sublabel">Secondary</div>
        </div>
      </div>
    </div>
    <button class="add-to-vault" id="add-to-vault-btn" onclick="doAdd()" style="background:#1a1a22;opacity:0.35;cursor:not-allowed">ADD TO VAULT</button>
  </div>
</div>

<div class="overlay" id="confirm-overlay" style="display:none">
  <div class="modal confirm-modal">
    <div class="confirm-icon" id="confirm-icon"></div>
    <div class="confirm-title" id="confirm-title"></div>
    <div class="confirm-body"><span class="confirm-name" id="confirm-name"></span><br/><span id="confirm-sub"></span></div>
    <div class="confirm-actions">
      <button class="cancel-btn" onclick="closeConfirm()">Cancel</button>
      <button class="go-btn" id="confirm-go-btn" onclick="doToggleWorn()">Confirm</button>
    </div>
  </div>
</div>

<div id="confetti-layer">
  <div id="confetti-msg">
    <div class="trophy">🏆</div>
    <div class="big-text">YOU ROCKED EM ALL</div>
    <div class="small-text">Every pair worn — resetting rotation...</div>
  </div>
</div>

<canvas id="extract-canvas" style="display:none"></canvas>

<script>
// ── Storage keys ──────────────────────────────────────────────────────────────
const STORAGE_KEY = 'sneaker-vault-v6';
const OLD_KEYS    = ['sneaker-vault-v5','sneaker-vault-v4','sneaker-vault-v3','sneaker-vault-v2'];

// ── State ─────────────────────────────────────────────────────────────────────
let collection         = [];
let currentView        = 'grid';
let currentTab         = 'unworn';
let pendingImg         = null;
let confirmId          = null;
let editId             = null;
let selectedColorFilter = null;
let colorPanelOpen     = false;

// ── Color buckets ─────────────────────────────────────────────────────────────
const BUCKETS = [
  { name:'White',  hex:'#f0ede8', test: h => h.l >= 75 },
  { name:'Black',  hex:'#1a1a1a', test: h => h.l < 18 },
  { name:'Grey',   hex:'#888888', test: h => h.l >= 18 && h.l < 75 && h.s < 14 },
  { name:'Brown',  hex:'#7a4520', test: h => h.h >= 14 && h.h < 46 && h.s >= 16 && h.l >= 10 && h.l < 50 },
  { name:'Red',    hex:'#d93030', test: h => (h.h < 14 || h.h >= 344) && h.s >= 18 },
  { name:'Orange', hex:'#e07020', test: h => h.h >= 14 && h.h < 46 && h.s >= 18 && h.l >= 50 },
  { name:'Yellow', hex:'#d4b800', test: h => h.h >= 46 && h.h < 72 && h.s >= 18 },
  { name:'Green',  hex:'#2e8b40', test: h => h.h >= 72 && h.h < 168 && h.s >= 20 },
  { name:'Cyan',   hex:'#00a8b5', test: h => h.h >= 168 && h.h < 200 && h.s >= 25 },
  { name:'Blue',   hex:'#2255cc', test: h => h.h >= 200 && h.h < 265 && h.s >= 12 },
  { name:'Purple', hex:'#6a28b0', test: h => h.h >= 265 && h.h < 310 && h.s >= 14 },
  { name:'Pink',   hex:'#cc4488', test: h => h.h >= 295 && h.h < 344 && h.s >= 12 && h.l >= 35 },
  { name:'Beige',  hex:'#d4b896', test: h => h.h >= 24 && h.h < 56 && h.s >= 8 && h.s < 40 && h.l >= 55 && h.l < 75 },
];

function hexToHsl(hex) {
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h = 0, s = 0, l = (max+min)/2;
  if (max !== min) {
    const d = max-min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h=((g-b)/d+(g<b?6:0))/6; break;
      case g: h=((b-r)/d+2)/6; break;
      case b: h=((r-g)/d+4)/6; break;
    }
  }
  return { h:h*360, s:s*100, l:l*100 };
}

function getBucket(hex) {
  if (!hex || hex === '#cccccc') return null;
  const hsl = hexToHsl(hex);
  for (const b of BUCKETS) { if (b.test(hsl)) return b; }
  // Fallback: relax saturation for muted tones
  for (const b of BUCKETS) {
    if (b.name==='White'||b.name==='Black'||b.name==='Grey') continue;
    if (b.test({ h:hsl.h, s:hsl.s*2, l:hsl.l })) return b;
  }
  return null;
}

function bucketName(hex) { const b = getBucket(hex); return b ? b.name : ''; }

// ── Image compression ─────────────────────────────────────────────────────────
function compressImage(dataUrl, callback) {
  const img = new Image();
  img.onload = () => {
    const MAX = 200; // 200px max — still sharp at card size, tiny in storage
    let w = img.width, h = img.height;
    if (w > MAX || h > MAX) {
      if (w > h) { h = Math.round(h*MAX/w); w = MAX; }
      else { w = Math.round(w*MAX/h); h = MAX; }
    }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    callback(canvas.toDataURL('image/jpeg', 0.6)); // 60% quality JPEG
  };
  img.onerror = () => callback(dataUrl);
  img.src = dataUrl;
}

// ── Color extraction ──────────────────────────────────────────────────────────
function extractColors(dataUrl, callback) {
  const img = new Image();
  img.onload = () => {
    const canvas = document.getElementById('extract-canvas');
    const ctx = canvas.getContext('2d');
    const W = 120, H = 120;
    canvas.width = W; canvas.height = H;
    ctx.drawImage(img, 0, 0, W, H);
    const data = ctx.getImageData(0, 0, W, H).data;
    const pixels = [];
    for (let i = 0; i < data.length; i += 4) {
      if (data[i+3] < 60) continue;
      pixels.push([data[i], data[i+1], data[i+2]]);
    }
    if (pixels.length < 10) { callback(null, null); return; }
    const freq = {};
    pixels.forEach(([r,g,b]) => {
      const key = [Math.round(r/20)*20, Math.round(g/20)*20, Math.round(b/20)*20].join(',');
      freq[key] = (freq[key]||0) + 1;
    });
    const sorted = Object.entries(freq).sort((a,b) => b[1]-a[1]);
    const total  = pixels.length;
    function toHex(key) { return '#'+key.split(',').map(x=>Math.min(255,+x).toString(16).padStart(2,'0')).join(''); }
    const primary = toHex(sorted[0][0]);
    let secondary = null;
    const pb = getBucket(primary);
    for (let i = 1; i < sorted.length; i++) {
      const h = toHex(sorted[i][0]);
      if (sorted[i][1]/total < 0.03) break;
      const b = getBucket(h);
      if (!pb || !b || b.name !== pb.name || sorted[0][1]/total > 0.60) { secondary = h; break; }
    }
    callback(primary, secondary);
  };
  img.onerror = () => callback(null, null);
  img.src = dataUrl;
}

// ── Storage ───────────────────────────────────────────────────────────────────
function load() {
  // Try current key first
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) collection = JSON.parse(r); } catch {}
  // Fall back to old keys if empty
  if (collection.length === 0) {
    for (const key of OLD_KEYS) {
      try {
        const r = localStorage.getItem(key);
        if (r) {
          const parsed = JSON.parse(r);
          if (parsed && parsed.length > 0) {
            collection = parsed;
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(collection)); } catch {}
            break;
          }
        }
      } catch {}
    }
  }
  buildColorPanel();
  render();
}

function persist() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(collection));
  } catch(e) {
    alert('Storage full — could not save. Images are compressed on new uploads but existing ones may be large. Try editing and re-uploading a few sneaker photos.');
    return;
  }
  buildColorPanel();
  render();
}

// ── Color filter panel ────────────────────────────────────────────────────────
function buildColorPanel() {
  const used = new Set();
  collection.forEach(s => { const b = getBucket(s.colorPrimary); if (b) used.add(b.name); });
  const panel = document.getElementById('color-filter-panel');
  panel.innerHTML = '';
  if (used.size === 0) return;
  BUCKETS.filter(b => used.has(b.name)).forEach(b => {
    const item = document.createElement('div');
    item.className = 'cf-item';
    item.onclick = () => { selectedColorFilter = selectedColorFilter===b.name?null:b.name; updateColorFilterBtn(); buildColorPanel(); render(); };
    const sw = document.createElement('div');
    sw.className = 'cf-swatch'+(selectedColorFilter===b.name?' selected':'');
    sw.style.background = b.hex;
    const lbl = document.createElement('div');
    lbl.className = 'cf-label';
    lbl.textContent = b.name;
    item.appendChild(sw); item.appendChild(lbl);
    panel.appendChild(item);
  });
  const clear = document.createElement('button');
  clear.className = 'cf-clear';
  clear.textContent = 'Clear';
  clear.onclick = () => { selectedColorFilter=null; updateColorFilterBtn(); buildColorPanel(); render(); };
  panel.appendChild(clear);
}

function toggleColorPanel() {
  colorPanelOpen = !colorPanelOpen;
  document.getElementById('color-filter-panel').style.display = colorPanelOpen ? 'flex' : 'none';
  document.getElementById('color-filter-btn').classList.toggle('active', colorPanelOpen||!!selectedColorFilter);
}

function updateColorFilterBtn() {
  document.getElementById('color-filter-btn').classList.toggle('active', !!selectedColorFilter||colorPanelOpen);
  document.getElementById('color-filter-label').textContent = selectedColorFilter||'Color';
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const total = collection.length;
  const worn  = collection.filter(s => s.worn).length;
  document.getElementById('cycle-text').textContent = total===0 ? 'YOUR COLLECTION AWAITS' : worn+' OF '+total+' WORN THIS CYCLE';
  const pb = document.getElementById('progress-bar');
  if (total > 0) {
    pb.style.display = 'block';
    const pf = document.getElementById('progress-fill');
    pf.style.width = ((worn/total)*100)+'%';
    pf.style.background = worn===total ? 'linear-gradient(90deg,#00FF88,#00D4FF)' : 'linear-gradient(90deg,#FFD700,#FF6B35)';
  } else { pb.style.display='none'; }
  document.getElementById('tabs').style.display = total>0 ? 'flex' : 'none';
  document.getElementById('tab-all').textContent    = 'All ('+total+')';
  document.getElementById('tab-unworn').textContent = 'Unworn ('+(total-worn)+')';
  document.getElementById('tab-worn').textContent   = 'Worn ('+worn+')';

  let filtered = currentTab==='worn'   ? collection.filter(s=>s.worn) :
                 currentTab==='unworn' ? collection.filter(s=>!s.worn) : collection;
  const q = (document.getElementById('search-inp').value||'').trim().toLowerCase();
  if (q) filtered = filtered.filter(s=>s.name.toLowerCase().includes(q));
  if (selectedColorFilter) filtered = filtered.filter(s=>{ const b=getBucket(s.colorPrimary); return b&&b.name===selectedColorFilter; });
  const sort = document.getElementById('sort-select').value;
  if (sort==='name')      filtered = [...filtered].sort((a,b)=>a.name.localeCompare(b.name));
  if (sort==='name-desc') filtered = [...filtered].sort((a,b)=>b.name.localeCompare(a.name));

  document.getElementById('empty-state').style.display  = total===0 ? 'block' : 'none';
  document.getElementById('bottom-add').style.display   = total===0 ? 'none'  : 'block';

  if (total===0) {
    document.getElementById('grid-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'none';
    return;
  }

  if (currentView==='grid') {
    document.getElementById('grid-view').style.display = 'grid';
    document.getElementById('list-view').style.display = 'none';
    let html = filtered.map(gridCard).join('');
    if (filtered.length % 2 !== 0) {
      html += '<div onclick="openAddModal()" style="background:rgba(255,180,0,0.04);border:2px dashed rgba(255,180,0,0.2);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;min-height:180px;">' +
        '<div style="font-size:28px;color:rgba(255,180,0,0.4)">+</div>' +
        '<div style="font-size:10px;color:rgba(255,180,0,0.4);font-weight:600;letter-spacing:1px">ADD PAIR</div></div>';
    }
    document.getElementById('grid-view').innerHTML = html;
  } else {
    document.getElementById('grid-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'flex';
    document.getElementById('list-view').innerHTML = filtered.map(listCard).join('');
  }
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function colorDotsHtml(s) {
  let h = '<div class="color-dots">';
  if (s.colorPrimary && s.colorPrimary!=='#cccccc') {
    const n = bucketName(s.colorPrimary);
    h += '<div class="color-dot" style="background:'+esc(s.colorPrimary)+'"></div>';
    if (n) h += '<span class="color-dot-label">'+esc(n)+'</span>';
  }
  if (s.colorSecondary && s.colorSecondary!=='#cccccc' && s.colorSecondary!==s.colorPrimary) {
    const n = bucketName(s.colorSecondary);
    h += '<div class="color-dot" style="background:'+esc(s.colorSecondary)+'"></div>';
    if (n) h += '<span class="color-dot-label">'+esc(n)+'</span>';
  }
  return h+'</div>';
}

function gridCard(s) {
  const bdr=s.worn?'#1a2a1a':'#1e1e2a', opc=s.worn?'0.72':'1';
  const wBg=s.worn?'rgba(255,107,53,0.1)':'rgba(0,212,255,0.08)';
  const wBd=s.worn?'rgba(255,107,53,0.3)':'rgba(0,212,255,0.2)';
  const wCl=s.worn?'#FF6B35':'#00D4FF';
  const img=s.img?'<img src="'+esc(s.img)+'" alt="" style="width:100%;height:100%;object-fit:contain;'+(s.worn?'filter:grayscale(0.4)':'')+'" onerror="this.style.display=\'none\'">':'<span style="font-size:34px">👟</span>';
  return '<div class="sv-card grid-card" style="border:1px solid '+bdr+';opacity:'+opc+'">'+(s.worn?'<div class="worn-badge-abs">WORN</div>':'')+
    '<div class="img-box">'+img+'</div>'+
    '<div class="card-name-txt" title="'+esc(s.name)+'">'+esc(s.name)+'</div>'+
    colorDotsHtml(s)+
    '<div class="card-actions">'+
    '<button class="worn-btn-grid" style="background:'+wBg+';border:1px solid '+wBd+';color:'+wCl+'" onclick="openConfirm('+s.id+')">'+(s.worn?'UNWEAR':'WORN')+'</button>'+
    '<button class="edit-btn-grid" onclick="openEditModal('+s.id+')">✏️</button>'+
    '<button class="del-btn-grid"  onclick="deleteSneaker('+s.id+')">🗑</button>'+
    '</div></div>';
}

function listCard(s) {
  const bdr=s.worn?'#1a2a1a':'#1e1e2a', opc=s.worn?'0.72':'1';
  const nCl=s.worn?'#555':'#f0ede8';
  const wBg=s.worn?'rgba(255,107,53,0.1)':'rgba(0,212,255,0.08)';
  const wBd=s.worn?'rgba(255,107,53,0.3)':'rgba(0,212,255,0.2)';
  const wCl=s.worn?'#FF6B35':'#00D4FF';
  const img=s.img?'<img src="'+esc(s.img)+'" alt="" style="width:100%;height:100%;object-fit:contain" onerror="this.style.display=\'none\'">':'<span style="font-size:22px">👟</span>';
  let dots='<div class="list-colors">';
  if (s.colorPrimary&&s.colorPrimary!=='#cccccc') dots+='<div class="color-dot" style="background:'+esc(s.colorPrimary)+'"></div>';
  if (s.colorSecondary&&s.colorSecondary!=='#cccccc'&&s.colorSecondary!==s.colorPrimary) dots+='<div class="color-dot" style="background:'+esc(s.colorSecondary)+'"></div>';
  dots+='</div>';
  return '<div class="sv-card list-card" style="border:1px solid '+bdr+';opacity:'+opc+'">'+'<div class="thumb">'+img+'</div>'+
    '<div class="list-info"><div class="list-name" style="color:'+nCl+'">'+esc(s.name)+'</div>'+dots+'</div>'+
    (s.worn?'<div class="worn-badge-list">WORN</div>':'')+
    '<div style="display:flex;gap:6px">'+
    '<button class="worn-btn-list" style="background:'+wBg+';border:1px solid '+wBd+';color:'+wCl+'" onclick="openConfirm('+s.id+')">'+(s.worn?'UNWEAR':'WORN')+'</button>'+
    '<button class="edit-btn-list" onclick="openEditModal('+s.id+')">✏️</button>'+
    '<button class="del-btn-list"  onclick="deleteSneaker('+s.id+')">🗑</button>'+
    '</div></div>';
}

// ── View / Tab ────────────────────────────────────────────────────────────────
function setView(v) {
  currentView=v;
  document.getElementById('btn-grid').classList.toggle('active',v==='grid');
  document.getElementById('btn-list').classList.toggle('active',v==='list');
  render();
}
function setTab(t) {
  currentTab=t;
  ['all','unworn','worn'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('active',x===t));
  render();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function resetColorPickers() {
  setPickerColor('primary','#cccccc');
  setPickerColor('secondary','#cccccc');
  document.getElementById('primary-name').textContent='—';
  document.getElementById('secondary-name').textContent='—';
  document.getElementById('extract-status').textContent='';
  document.getElementById('extract-status').style.color='#888';
}

function setPickerColor(which,hex) {
  document.getElementById(which+'-color-inp').value=hex;
  document.getElementById(which+'-preview').style.background=hex;
  const n=bucketName(hex);
  document.getElementById(which+'-name').textContent=n||(hex==='#cccccc'?'—':'Custom');
}

function onColorChange(which) {
  const hex=document.getElementById(which+'-color-inp').value;
  document.getElementById(which+'-preview').style.background=hex;
  document.getElementById(which+'-name').textContent=bucketName(hex)||'Custom';
}

function openAddModal() {
  editId=null;
  document.getElementById('modal-title-text').textContent='ADD SNEAKER';
  document.getElementById('sneaker-name-inp').value='';
  resetColorPickers(); removeImg();
  document.getElementById('add-overlay').style.display='flex';
  setTimeout(()=>document.getElementById('sneaker-name-inp').focus(),100);
  updateAddBtn();
}

function openEditModal(id) {
  const s=collection.find(x=>x.id===id); if(!s)return;
  editId=id;
  document.getElementById('modal-title-text').textContent='EDIT SNEAKER';
  document.getElementById('sneaker-name-inp').value=s.name;
  setPickerColor('primary',s.colorPrimary||'#cccccc');
  setPickerColor('secondary',s.colorSecondary||'#cccccc');
  document.getElementById('extract-status').textContent='';
  pendingImg=s.img||null;
  if (pendingImg) {
    document.getElementById('img-preview').src=pendingImg;
    document.getElementById('img-preview').style.display='block';
    document.getElementById('upload-placeholder').style.display='none';
    document.getElementById('remove-img-btn').style.display='block';
  } else { removeImg(); }
  document.getElementById('add-overlay').style.display='flex';
  updateAddBtn();
}

function closeAddModal() {
  document.getElementById('add-overlay').style.display='none';
  editId=null; removeImg();
}

function handleFile(inp) {
  const f=inp.files[0]; if(!f)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const status=document.getElementById('extract-status');
    status.style.color='#888'; status.textContent='Processing…';
    compressImage(ev.target.result, compressed=>{
      pendingImg=compressed;
      document.getElementById('img-preview').src=pendingImg;
      document.getElementById('img-preview').style.display='block';
      document.getElementById('upload-placeholder').style.display='none';
      document.getElementById('remove-img-btn').style.display='block';
      status.textContent='Detecting colors…';
      extractColors(pendingImg,(primary,secondary)=>{
        if(!primary){ status.style.color='#ff8080'; status.textContent='Could not detect colors — set manually'; return; }
        setPickerColor('primary',primary);
        setPickerColor('secondary',secondary||primary);
        status.style.color='#00C864'; status.textContent='Colors detected ✓';
      });
    });
  };
  reader.readAsDataURL(f);
}

function removeImg() {
  pendingImg=null;
  document.getElementById('img-preview').style.display='none';
  document.getElementById('img-preview').src='';
  document.getElementById('upload-placeholder').style.display='block';
  document.getElementById('remove-img-btn').style.display='none';
  document.getElementById('file-inp').value='';
  document.getElementById('extract-status').textContent='';
  resetColorPickers();
}

function updateAddBtn() {
  const name=document.getElementById('sneaker-name-inp').value.trim();
  const btn=document.getElementById('add-to-vault-btn');
  btn.textContent=editId?'SAVE CHANGES':'ADD TO VAULT';
  btn.style.background=name?'linear-gradient(135deg,#FFD700,#FF8C00)':'#1a1a22';
  btn.style.opacity=name?'1':'0.35';
  btn.style.cursor=name?'pointer':'not-allowed';
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('sneaker-name-inp').addEventListener('input',updateAddBtn);
});

function doAdd() {
  const name=document.getElementById('sneaker-name-inp').value.trim(); if(!name)return;
  const pc=document.getElementById('primary-color-inp').value;
  const sc=document.getElementById('secondary-color-inp').value;
  if (editId!==null) {
    collection=collection.map(s=>s.id===editId?{...s,name,img:pendingImg,colorPrimary:pc,colorSecondary:sc}:s);
  } else {
    collection.push({id:Date.now(),name,img:pendingImg,colorPrimary:pc,colorSecondary:sc,worn:false});
  }
  persist(); closeAddModal();
}

// ── Worn ──────────────────────────────────────────────────────────────────────
function openConfirm(id) {
  const s=collection.find(x=>x.id===id); if(!s)return;
  confirmId=id;
  document.getElementById('confirm-icon').textContent=s.worn?'↩️':'👟';
  document.getElementById('confirm-title').textContent=s.worn?'MARK AS UNWORN?':'MARK AS WORN?';
  document.getElementById('confirm-title').style.color=s.worn?'#FF6B35':'#00D4FF';
  document.getElementById('confirm-name').textContent=s.name;
  document.getElementById('confirm-sub').textContent=s.worn?'Returns it to your active rotation.':'Logs this pair as worn this cycle.';
  const gb=document.getElementById('confirm-go-btn');
  gb.style.background=s.worn?'rgba(255,107,53,0.15)':'rgba(0,212,255,0.12)';
  gb.style.border='1px solid '+(s.worn?'#FF6B35':'#00D4FF');
  gb.style.color=s.worn?'#FF6B35':'#00D4FF';
  document.getElementById('confirm-overlay').style.display='flex';
}
function closeConfirm(){ document.getElementById('confirm-overlay').style.display='none'; confirmId=null; }
function doToggleWorn(){
  if(confirmId===null)return;
  collection=collection.map(s=>s.id===confirmId?{...s,worn:!s.worn}:s);
  persist(); closeConfirm();
  if(collection.length>0&&collection.every(s=>s.worn))setTimeout(showCelebration,300);
}
function deleteSneaker(id){ collection=collection.filter(s=>s.id!==id); persist(); }

// ── Confetti ──────────────────────────────────────────────────────────────────
function showCelebration(){
  const layer=document.getElementById('confetti-layer');
  layer.style.display='block';
  const colors=['#FFD700','#FF6B35','#00D4FF','#FF3CAC','#00FF88'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='cf-piece';
    const sz=6+Math.random()*8;
    el.style.cssText='left:'+(Math.random()*100)+'%;width:'+sz+'px;height:'+sz+'px;background:'+colors[i%5]+';animation:fall '+(2+Math.random()*2)+'s '+(Math.random()*2)+'s linear forwards';
    layer.appendChild(el);
  }
  setTimeout(()=>{
    layer.style.display='none';
    layer.querySelectorAll('.cf-piece').forEach(el=>el.remove());
    collection=collection.map(s=>({...s,worn:false}));
    persist();
  },4500);
}

load();
</script>

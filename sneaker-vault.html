<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Sneaker Vault"/>
  <meta name="theme-color" content="#080810"/>
  <title>Sneaker Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080810; color: #f0ede8; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 2px; }

    @keyframes fuup { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fall  { from { transform:translateY(-20px) rotate(0deg); opacity:1; } to { transform:translateY(110vh) rotate(720deg); opacity:0; } }
    @keyframes pop   { 0%{transform:translate(-50%,-50%) scale(0.3);opacity:0} 60%{transform:translate(-50%,-50%) scale(1.1)} 100%{transform:translate(-50%,-50%) scale(1);opacity:1} }

    .sv-card { animation: fuup 0.3s ease; transition: transform 0.2s, box-shadow 0.2s; }
    .sv-card:hover { transform: translateY(-3px); box-shadow: 0 16px 40px rgba(0,0,0,0.6); }
    button { font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; }

    /* Header */
    #header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,8,16,0.97); backdrop-filter: blur(20px);
      border-bottom: 1px solid #16161f; padding: 20px 20px 0;
    }
    .header-inner { max-width: 1100px; margin: 0 auto; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
    .vault-title {
      font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px, 8vw, 52px);
      letter-spacing: 6px; line-height: 1;
      background: linear-gradient(135deg, #FFD700 0%, #FF6B35 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .vault-sub { color: #444; font-size: 12px; letter-spacing: 2px; margin-top: 4px; }
    .header-actions { display: flex; gap: 10px; align-items: center; }
    .view-toggle { display: flex; background: #13131a; border-radius: 8px; padding: 3px; border: 1px solid #1e1e2a; }
    .view-btn { padding: 7px 13px; background: transparent; color: #444; border-radius: 6px; font-size: 16px; transition: all 0.15s; }
    .view-btn.active { background: #2a2a3a; color: #f0ede8; }
    .add-btn { padding: 10px 20px; background: linear-gradient(135deg,#FFD700,#FF8C00); color: #080810; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 19px; letter-spacing: 2px; box-shadow: 0 4px 20px rgba(255,180,0,0.25); }
    #progress-bar { height: 3px; background: #16161f; border-radius: 2px; margin-bottom: 14px; overflow: hidden; }
    #progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
    #tabs { display: flex; }
    .tab-btn { padding: 8px 18px; background: none; border: none; border-bottom: 2px solid transparent; color: #444; font-weight: 500; font-size: 13px; margin-bottom: -1px; transition: all 0.15s; }
    .tab-btn.active { border-bottom-color: #FFD700; color: #FFD700; }

    /* Collection */
    #collection { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
    #empty-state { text-align: center; padding: 80px 20px; }
    #empty-state .big-shoe { font-size: 70px; margin-bottom: 16px; }
    #empty-state h2 { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 5px; color: #2a2a3a; margin-bottom: 10px; }
    #empty-state p { color: #3a3a4a; font-size: 15px; margin-bottom: 24px; }
    #empty-state .start-btn { padding: 14px 36px; background: linear-gradient(135deg,#FFD700,#FF8C00); color: #080810; border-radius: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 3px; box-shadow: 0 8px 30px rgba(255,180,0,0.2); }

    #grid-view { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    @media (max-width: 700px) { #grid-view { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 400px) { #grid-view { grid-template-columns: repeat(2, 1fr); } }

    .grid-card { background: #13131a; border-radius: 14px; padding: 14px; position: relative; }
    .grid-card .worn-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,200,100,0.12); border: 1px solid rgba(0,200,100,0.25); border-radius: 20px; padding: 2px 7px; font-size: 9px; color: #00C864; font-weight: 700; letter-spacing: 1px; }
    .grid-card .img-box { display: flex; justify-content: center; align-items: center; height: 110px; margin-bottom: 10px; background: #0a0a12; border-radius: 10px; overflow: hidden; }
    .grid-card .img-box img { width: 100%; height: 100%; object-fit: contain; }
    .grid-card .shoe-emoji { font-size: 36px; }
    .grid-card .card-name { font-weight: 600; font-size: 12px; line-height: 1.3; margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .grid-card .card-actions { display: flex; gap: 5px; }
    .worn-btn-grid { flex: 1; padding: 7px 0; border-radius: 7px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; transition: filter 0.15s; }
    .worn-btn-grid:hover { filter: brightness(1.3); }
    .del-btn-grid { padding: 7px 9px; background: rgba(255,40,40,0.06); border: 1px solid rgba(255,40,40,0.1) !important; border-radius: 7px; color: #664444; font-size: 11px; }

    #list-view { display: flex; flex-direction: column; gap: 10px; }
    .list-card { background: #13131a; border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 14px; }
    .list-card .thumb { width: 60px; height: 60px; background: #0a0a12; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .list-card .thumb img { width: 100%; height: 100%; object-fit: contain; }
    .list-card .thumb .shoe-emoji { font-size: 24px; }
    .list-card .card-name { flex: 1; font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .list-card .worn-badge-list { background: rgba(0,200,100,0.1); border: 1px solid rgba(0,200,100,0.2); border-radius: 20px; padding: 3px 10px; font-size: 10px; color: #00C864; font-weight: 700; letter-spacing: 1px; white-space: nowrap; }
    .worn-btn-list { padding: 8px 14px; border-radius: 8px; font-size: 11px; font-weight: 700; white-space: nowrap; transition: filter 0.15s; }
    .worn-btn-list:hover { filter: brightness(1.3); }
    .del-btn-list { padding: 8px 10px; background: none !important; border: 1px solid #1e1e2a !important; border-radius: 8px; color: #554444; font-size: 13px; }

    /* Overlay */
    .overlay { position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: #13131a; border: 1px solid #2a2a3a; border-radius: 20px; padding: 32px; max-width: 440px; width: 100%; animation: fuup 0.2s ease; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; background: linear-gradient(135deg,#FFD700,#FF8C00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .close-btn { background: none; color: #555; font-size: 24px; }
    .text-inp { background: #0a0a12; border: 1px solid #2a2a3a; border-radius: 10px; color: #f0ede8; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; padding: 12px 16px; width: 100%; margin-bottom: 16px; }
    .upload-zone { border: 2px dashed #2a2a3a; border-radius: 12px; padding: 28px 20px; text-align: center; cursor: pointer; margin-bottom: 16px; transition: border-color 0.2s; }
    .upload-zone:hover { border-color: #444; }
    .upload-zone img { max-height: 130px; object-fit: contain; }
    .upload-icon { font-size: 34px; margin-bottom: 8px; }
    .upload-label { color: #555; font-size: 14px; }
    .upload-hint  { color: #333; font-size: 12px; margin-top: 4px; }
    .remove-img { background: none; color: #555; font-size: 12px; display: block; margin-bottom: 14px; padding: 0; }
    .add-to-vault { width: 100%; padding: 14px 0; color: #080810; border-radius: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; transition: all 0.2s; }

    /* Confirm modal */
    .confirm-modal { max-width: 360px; text-align: center; }
    .confirm-icon { font-size: 52px; margin-bottom: 12px; }
    .confirm-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; margin-bottom: 8px; }
    .confirm-body { color: #888; font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
    .confirm-name { color: #f0ede8; font-weight: 600; }
    .confirm-actions { display: flex; gap: 10px; }
    .cancel-btn { flex: 1; padding: 12px 0; background: transparent; border: 1px solid #2a2a3a !important; border-radius: 10px; color: #666; font-size: 14px; }
    .go-btn { flex: 1; padding: 12px 0; border-radius: 10px; font-weight: 700; font-size: 14px; }

    /* Confetti */
    #confetti-layer { position: fixed; inset: 0; pointer-events: none; z-index: 9999; overflow: hidden; display: none; }
    .cf-piece { position: absolute; top: -20px; border-radius: 50%; }
    #confetti-msg { position: absolute; top: 40%; left: 50%; animation: pop 0.5s ease forwards; text-align: center; white-space: nowrap; }
    #confetti-msg .trophy { font-size: 60px; }
    #confetti-msg .big-text { font-family: 'Bebas Neue', sans-serif; font-size: clamp(28px,6vw,44px); color: #FFD700; letter-spacing: 4px; text-shadow: 0 0 40px rgba(255,215,0,0.9); }
    #confetti-msg .small-text { font-family: 'DM Sans', sans-serif; color: #fff; font-size: 16px; margin-top: 8px; opacity: 0.8; }
  </style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="vault-title">SNEAKER VAULT</div>
        <div class="vault-sub" id="cycle-text">YOUR COLLECTION AWAITS</div>
      </div>
      <div class="header-actions">
        <div class="view-toggle">
          <button class="view-btn active" id="btn-grid" onclick="setView('grid')">⊞</button>
          <button class="view-btn" id="btn-list" onclick="setView('list')">☰</button>
        </div>
        <button class="add-btn" onclick="openAddModal()">+ ADD</button>
      </div>
    </div>
    <div id="progress-bar" style="display:none">
      <div id="progress-fill"></div>
    </div>
    <div id="tabs" style="display:none">
      <button class="tab-btn active" onclick="setTab('all')"   id="tab-all">All</button>
      <button class="tab-btn"        onclick="setTab('unworn')" id="tab-unworn">Unworn</button>
      <button class="tab-btn"        onclick="setTab('worn')"   id="tab-worn">Worn</button>
    </div>
  </div>
</div>

<!-- Collection -->
<div id="collection">
  <div id="empty-state">
    <div class="big-shoe">👟</div>
    <h2>VAULT IS EMPTY</h2>
    <p>Start adding your kicks to track your rotation</p>
    <button class="start-btn" onclick="openAddModal()">ADD YOUR FIRST PAIR</button>
  </div>
  <div id="grid-view" style="display:none"></div>
  <div id="list-view" style="display:none"></div>
</div>

<!-- Add Modal -->
<div class="overlay" id="add-overlay" style="display:none" onclick="if(event.target===this)closeAddModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">ADD SNEAKER</div>
      <button class="close-btn" onclick="closeAddModal()">✕</button>
    </div>
    <input class="text-inp" id="sneaker-name-inp" type="text" placeholder="Sneaker name / colorway" onkeydown="if(event.key==='Enter')doAdd()"/>
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-inp').click()">
      <div id="upload-placeholder">
        <div class="upload-icon">📸</div>
        <div class="upload-label">Tap to upload sneaker photo</div>
        <div class="upload-hint">PNG with transparent background looks best</div>
      </div>
      <img id="img-preview" style="display:none" alt="preview"/>
    </div>
    <input type="file" id="file-inp" accept="image/*" style="display:none" onchange="handleFile(this)"/>
    <button class="remove-img" id="remove-img-btn" style="display:none" onclick="removeImg()">✕ Remove image</button>
    <button class="add-to-vault" id="add-to-vault-btn" onclick="doAdd()" style="background:#1a1a22;opacity:0.35;cursor:not-allowed">ADD TO VAULT</button>
  </div>
</div>

<!-- Confirm Worn Modal -->
<div class="overlay" id="confirm-overlay" style="display:none">
  <div class="modal confirm-modal">
    <div class="confirm-icon" id="confirm-icon"></div>
    <div class="confirm-title" id="confirm-title"></div>
    <div class="confirm-body">
      <span class="confirm-name" id="confirm-name"></span><br/>
      <span id="confirm-sub"></span>
    </div>
    <div class="confirm-actions">
      <button class="cancel-btn" onclick="closeConfirm()">Cancel</button>
      <button class="go-btn" id="confirm-go-btn" onclick="doToggleWorn()">Confirm</button>
    </div>
  </div>
</div>

<!-- Confetti -->
<div id="confetti-layer">
  <div id="confetti-msg">
    <div class="trophy">🏆</div>
    <div class="big-text">YOU ROCKED EM ALL</div>
    <div class="small-text">Every pair worn — resetting rotation...</div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'sneaker-vault-v4';
  let collection = [];
  let currentView = 'grid';
  let currentTab  = 'all';
  let pendingImg  = null;
  let confirmId   = null;

  // ---- Storage (localStorage for standalone PWA) ----
  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) collection = JSON.parse(raw);
    } catch {}
    render();
  }

  function persist() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(collection)); } catch {}
    render();
  }

  // ---- Render ----
  function render() {
    const total = collection.length;
    const worn  = collection.filter(s => s.worn).length;

    // Cycle text
    document.getElementById('cycle-text').textContent =
      total === 0 ? 'YOUR COLLECTION AWAITS' : worn + ' OF ' + total + ' WORN THIS CYCLE';

    // Progress bar
    const pb = document.getElementById('progress-bar');
    const pf = document.getElementById('progress-fill');
    if (total > 0) {
      pb.style.display = 'block';
      const pct = (worn / total) * 100;
      pf.style.width = pct + '%';
      pf.style.background = worn === total
        ? 'linear-gradient(90deg,#00FF88,#00D4FF)'
        : 'linear-gradient(90deg,#FFD700,#FF6B35)';
    } else {
      pb.style.display = 'none';
    }

    // Tabs
    const tabsEl = document.getElementById('tabs');
    tabsEl.style.display = total > 0 ? 'flex' : 'none';
    document.getElementById('tab-all').textContent    = 'All (' + total + ')';
    document.getElementById('tab-unworn').textContent = 'Unworn (' + (total - worn) + ')';
    document.getElementById('tab-worn').textContent   = 'Worn (' + worn + ')';

    // Filter
    const filtered = currentTab === 'worn'   ? collection.filter(s => s.worn) :
                     currentTab === 'unworn' ? collection.filter(s => !s.worn) :
                     collection;

    // Empty state
    document.getElementById('empty-state').style.display = total === 0 ? 'block' : 'none';

    if (total === 0) {
      document.getElementById('grid-view').style.display = 'none';
      document.getElementById('list-view').style.display = 'none';
      return;
    }

    if (currentView === 'grid') {
      document.getElementById('grid-view').style.display = 'grid';
      document.getElementById('list-view').style.display = 'none';
      document.getElementById('grid-view').innerHTML = filtered.map(s => gridCard(s)).join('');
    } else {
      document.getElementById('grid-view').style.display = 'none';
      document.getElementById('list-view').style.display = 'flex';
      document.getElementById('list-view').innerHTML = filtered.map(s => listCard(s)).join('');
    }
  }

  function imgHtml(s, size) {
    if (s.img) {
      return '<img src="' + s.img + '" alt="" style="width:100%;height:100%;object-fit:contain;' +
        (s.worn ? 'filter:grayscale(0.4);' : '') + '" onerror="this.style.display=\'none\'">';
    }
    return '<span class="shoe-emoji">👟</span>';
  }

  function gridCard(s) {
    const border  = s.worn ? '#1a2a1a' : '#1e1e2a';
    const opacity = s.worn ? '0.72' : '1';
    const wornBadge = s.worn ? '<div class="worn-badge">WORN</div>' : '';
    const wornBg  = s.worn ? 'rgba(255,107,53,0.1)' : 'rgba(0,212,255,0.08)';
    const wornBdr = s.worn ? 'rgba(255,107,53,0.3)' : 'rgba(0,212,255,0.2)';
    const wornClr = s.worn ? '#FF6B35' : '#00D4FF';
    const wornLbl = s.worn ? 'UNWEAR' : 'WORN';
    return '<div class="sv-card grid-card" style="border:1px solid ' + border + ';opacity:' + opacity + '">' +
      wornBadge +
      '<div class="img-box">' + imgHtml(s) + '</div>' +
      '<div class="card-name" title="' + esc(s.name) + '">' + esc(s.name) + '</div>' +
      '<div class="card-actions">' +
      '<button class="worn-btn-grid" style="background:' + wornBg + ';border:1px solid ' + wornBdr + ';color:' + wornClr + '" onclick="openConfirm(' + s.id + ')">' + wornLbl + '</button>' +
      '<button class="del-btn-grid" onclick="deleteSneaker(' + s.id + ')">🗑</button>' +
      '</div></div>';
  }

  function listCard(s) {
    const border  = s.worn ? '#1a2a1a' : '#1e1e2a';
    const opacity = s.worn ? '0.72' : '1';
    const nameClr = s.worn ? '#555' : '#f0ede8';
    const wornBadge = s.worn ? '<div class="worn-badge-list">WORN</div>' : '';
    const wornBg  = s.worn ? 'rgba(255,107,53,0.1)' : 'rgba(0,212,255,0.08)';
    const wornBdr = s.worn ? 'rgba(255,107,53,0.3)' : 'rgba(0,212,255,0.2)';
    const wornClr = s.worn ? '#FF6B35' : '#00D4FF';
    const wornLbl = s.worn ? 'UNWEAR' : 'WORN';
    return '<div class="sv-card list-card" style="border:1px solid ' + border + ';opacity:' + opacity + '">' +
      '<div class="thumb">' + imgHtml(s) + '</div>' +
      '<div class="card-name" style="color:' + nameClr + '">' + esc(s.name) + '</div>' +
      wornBadge +
      '<div style="display:flex;gap:8px">' +
      '<button class="worn-btn-list" style="background:' + wornBg + ';border:1px solid ' + wornBdr + ';color:' + wornClr + '" onclick="openConfirm(' + s.id + ')">' + wornLbl + '</button>' +
      '<button class="del-btn-list" onclick="deleteSneaker(' + s.id + ')">🗑</button>' +
      '</div></div>';
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ---- View / Tab ----
  function setView(v) {
    currentView = v;
    document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
    document.getElementById('btn-list').classList.toggle('active', v === 'list');
    render();
  }

  function setTab(t) {
    currentTab = t;
    ['all','unworn','worn'].forEach(x => document.getElementById('tab-'+x).classList.toggle('active', x === t));
    render();
  }

  // ---- Add modal ----
  function openAddModal() {
    document.getElementById('sneaker-name-inp').value = '';
    removeImg();
    document.getElementById('add-overlay').style.display = 'flex';
    setTimeout(() => document.getElementById('sneaker-name-inp').focus(), 100);
    updateAddBtn();
  }

  function closeAddModal() {
    document.getElementById('add-overlay').style.display = 'none';
    removeImg();
  }

  function handleFile(inp) {
    const f = inp.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      pendingImg = ev.target.result;
      document.getElementById('img-preview').src = pendingImg;
      document.getElementById('img-preview').style.display = 'block';
      document.getElementById('upload-placeholder').style.display = 'none';
      document.getElementById('remove-img-btn').style.display = 'block';
    };
    reader.readAsDataURL(f);
  }

  function removeImg() {
    pendingImg = null;
    document.getElementById('img-preview').style.display = 'none';
    document.getElementById('img-preview').src = '';
    document.getElementById('upload-placeholder').style.display = 'block';
    document.getElementById('remove-img-btn').style.display = 'none';
    document.getElementById('file-inp').value = '';
  }

  function updateAddBtn() {
    const name = document.getElementById('sneaker-name-inp').value.trim();
    const btn  = document.getElementById('add-to-vault-btn');
    if (name) {
      btn.style.background = 'linear-gradient(135deg,#FFD700,#FF8C00)';
      btn.style.opacity = '1';
      btn.style.cursor = 'pointer';
    } else {
      btn.style.background = '#1a1a22';
      btn.style.opacity = '0.35';
      btn.style.cursor = 'not-allowed';
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('sneaker-name-inp').addEventListener('input', updateAddBtn);
  });

  function doAdd() {
    const name = document.getElementById('sneaker-name-inp').value.trim();
    if (!name) return;
    collection.push({ id: Date.now(), name: name, img: pendingImg, worn: false });
    persist();
    closeAddModal();
  }

  // ---- Worn confirm ----
  function openConfirm(id) {
    const s = collection.find(x => x.id === id);
    if (!s) return;
    confirmId = id;
    document.getElementById('confirm-icon').textContent  = s.worn ? '↩️' : '👟';
    document.getElementById('confirm-title').textContent = s.worn ? 'MARK AS UNWORN?' : 'MARK AS WORN?';
    document.getElementById('confirm-title').style.color = s.worn ? '#FF6B35' : '#00D4FF';
    document.getElementById('confirm-name').textContent  = s.name;
    document.getElementById('confirm-sub').textContent   = s.worn ? 'Returns it to your active rotation.' : 'Logs this pair as worn this cycle.';
    const goBtn = document.getElementById('confirm-go-btn');
    goBtn.style.background = s.worn ? 'rgba(255,107,53,0.15)' : 'rgba(0,212,255,0.12)';
    goBtn.style.border     = '1px solid ' + (s.worn ? '#FF6B35' : '#00D4FF');
    goBtn.style.color      = s.worn ? '#FF6B35' : '#00D4FF';
    document.getElementById('confirm-overlay').style.display = 'flex';
  }

  function closeConfirm() {
    document.getElementById('confirm-overlay').style.display = 'none';
    confirmId = null;
  }

  function doToggleWorn() {
    if (confirmId === null) return;
    collection = collection.map(s => s.id === confirmId ? { ...s, worn: !s.worn } : s);
    persist();
    closeConfirm();
    if (collection.length > 0 && collection.every(s => s.worn)) {
      setTimeout(showCelebration, 300);
    }
  }

  function deleteSneaker(id) {
    collection = collection.filter(s => s.id !== id);
    persist();
  }

  // ---- Celebration ----
  function showCelebration() {
    const layer = document.getElementById('confetti-layer');
    layer.style.display = 'block';
    // Generate pieces
    const colors = ['#FFD700','#FF6B35','#00D4FF','#FF3CAC','#00FF88'];
    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.className = 'cf-piece';
      const size = 6 + Math.random() * 8;
      el.style.cssText = [
        'left:' + (Math.random()*100) + '%',
        'width:' + size + 'px',
        'height:' + size + 'px',
        'background:' + colors[i % 5],
        'animation:fall ' + (2 + Math.random()*2) + 's ' + (Math.random()*2) + 's linear forwards',
      ].join(';');
      layer.appendChild(el);
    }
    setTimeout(() => {
      layer.style.display = 'none';
      layer.querySelectorAll('.cf-piece').forEach(el => el.remove());
      collection = collection.map(s => ({ ...s, worn: false }));
      persist();
    }, 4500);
  }

  // ---- Init ----
  load();
</script>
</body>
</html>
